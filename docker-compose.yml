services:
  postgres:
    image: postgres:16-alpine
    container_name: my_company_postgres
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mycompany}
      POSTGRES_USER: ${POSTGRES_USER:-mycompany}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mycompany}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: my_company_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-mycompany_redis} --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  bot:
    build: .
    container_name: my_company_bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mycompany}:${POSTGRES_PASSWORD:-mycompany}@postgres:5432/${POSTGRES_DB:-mycompany}
      REDIS_URL: redis://:${REDIS_PASSWORD:-mycompany_redis}@redis:6379/0
      PROXY_URL: http://host.containers.internal:7890
    depends_on:
      - postgres
      - redis
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  api:
    build: .
    container_name: my_company_api
    command: uv run python -m api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mycompany}:${POSTGRES_PASSWORD:-mycompany}@postgres:5432/${POSTGRES_DB:-mycompany}
      REDIS_URL: redis://:${REDIS_PASSWORD:-mycompany_redis}@redis:6379/0
    ports:
      - "${API_PORT:-8090}:${API_PORT:-8090}"
    depends_on:
      - postgres
      - redis
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
